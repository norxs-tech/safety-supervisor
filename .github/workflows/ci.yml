name: CI — Safety Supervisor Gateway

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # Job 1: Host-Native Unit Tests (ASan + UBSan)
  # ============================================================================
  unit-tests:
    name: Unit Tests (host-native, ASan + UBSan)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build gcc clang gcovr

      - name: Configure (TEST target)
        run: |
          cmake -B build/test -DNORXS_TARGET=TEST \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build/test --parallel

      - name: Run tests
        run: |
          ctest --test-dir build/test -V --output-on-failure \
            --output-junit unit-test-report.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            build/test/unit-test-report.xml
            build/test/Testing/

      - name: Build with coverage instrumentation
        run: |
          cmake -B build/cov -DNORXS_TARGET=TEST \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNORXS_COVERAGE=ON \
            -G Ninja
          cmake --build build/cov --parallel
          ctest --test-dir build/cov --output-on-failure

      - name: Coverage report (gate ≥ 80% line on tested BSW/CDD/OS modules)
        run: |
          gcovr --root . \
            --filter 'src/m7_rtos/bsw/e2e/' \
            --filter 'src/m7_rtos/bsw/wdgm/' \
            --filter 'src/m7_rtos/bsw/dem/' \
            --filter 'src/m7_rtos/cdd/ipc_ringbuffer/' \
            --filter 'src/m7_rtos/os/Sbst.c' \
            --object-directory build/cov \
            --print-summary \
            --xml coverage.xml --xml-pretty \
            --fail-under-line 80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================================
  # Job 2: M7 Cross-Compile (ARM Cortex-M7, -Werror)
  # ============================================================================
  build-m7:
    name: M7 Safety Core Cross-Compile
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Configure (M7 target)
        run: |
          cmake -B build/m7 -DNORXS_TARGET=M7 \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_OBJCOPY=arm-none-eabi-objcopy \
            -DCMAKE_SIZE=arm-none-eabi-size \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build/m7 --parallel

      - name: Show memory usage
        run: arm-none-eabi-size build/m7/m7_safety_supervisor.elf

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m7-safety-supervisor-elf
          path: |
            build/m7/m7_safety_supervisor.elf
            build/m7/m7_safety_supervisor.hex
            build/m7/m7_safety_supervisor.bin
            build/m7/m7_safety_supervisor.map
          retention-days: 30

  # ============================================================================
  # Job 3: Stack Usage Analysis (ISO 26262 §7.4.10)
  # ============================================================================
  stack-analysis:
    name: Stack Usage Analysis
    runs-on: ubuntu-24.04
    needs: build-m7

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: Build with -fstack-usage
        run: |
          cmake -B build/stack -DNORXS_TARGET=M7 \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc \
            -DCMAKE_OBJCOPY=arm-none-eabi-objcopy \
            -DCMAKE_SIZE=arm-none-eabi-size \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build build/stack --parallel

      - name: Report top stack consumers
        run: |
          echo "=== Top 20 Stack Consumers ==="
          find build/stack -name "*.su" -exec cat {} \; \
            | sort -t$'\t' -k2 -rn | head -20

      - name: Fail on unbounded stack (ASIL-D requirement)
        run: |
          UNBOUNDED=$(find build/stack -name "*.su" -exec grep -l "?" {} \;)
          if [ -n "$UNBOUNDED" ]; then
            echo "ERROR: Unbounded stack detected:"
            echo "$UNBOUNDED"
            find build/stack -name "*.su" -exec grep "?" {} \; -print
            exit 1
          fi
          echo "PASS: No unbounded stack usage found"

      - name: Upload stack report
        uses: actions/upload-artifact@v4
        with:
          name: stack-usage-report
          path: build/stack/

  # ============================================================================
  # Job 4: MISRA C Static Analysis (cppcheck)
  # ============================================================================
  misra-lint:
    name: Static Analysis (cppcheck / MISRA C proxy)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck on M7 + A53 sources
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --suppressions-list=tools/cppcheck_suppressions.txt \
            --inline-suppr \
            -I include/types \
            -I src/m7_rtos/bsw \
            -I src/m7_rtos/bsw/e2e \
            -I src/m7_rtos/bsw/dem \
            -I src/m7_rtos/bsw/wdgm \
            -I src/m7_rtos/bsw/csm \
            -I src/m7_rtos/bsw/memmap \
            -I src/m7_rtos/cdd/ipc_ringbuffer \
            -I src/m7_rtos/rte \
            -I src/m7_rtos/os \
            -I src/m7_rtos/swc/swc_vehicle_dynamics \
            -I src/m7_rtos/swc/swc_safe_state_mgr \
            --std=c11 \
            src/m7_rtos/ src/qnx_a53/ \
            2>&1 | tee cppcheck_report.txt

      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck_report.txt

  # ============================================================================
  # Job 5: AUTOSAR Compliance Pattern Scan
  # ============================================================================
  compliance-scan:
    name: AUTOSAR / MISRA Compliance Pattern Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden patterns
        run: |
          echo "=== Checking forbidden patterns ==="
          FAIL=0

          echo -n "malloc/calloc/realloc/VLA: "
          COUNT=$(grep -rn "\bmalloc\b\|\bcalloc\b\|\brealloc\b" \
                  include/ src/ --include="*.c" --include="*.h" \
                  | grep -v "^.*//\|@" | wc -l)
          echo "$COUNT"; [ "$COUNT" -ne 0 ] && FAIL=1

          echo -n "Dynamic allocation in linker script (heap size=0 check): "
          HEAP=$(grep -c "HEAP_SIZE\s*=\s*0" tools/s32g_m7_safety.ld || true)
          echo "heap_zero_count=$HEAP"

          echo -n "Recursive calls: "
          # Simple self-call check
          COUNT=$(grep -rn "^\([A-Za-z_][A-Za-z0-9_]*\)(.*\1(" \
                  src/m7_rtos/ --include="*.c" | wc -l)
          echo "$COUNT"

          echo ""
          if [ "$FAIL" -eq 0 ]; then
            echo "All AUTOSAR compliance checks passed."
          else
            echo "AUTOSAR compliance violations found."
            exit 1
          fi

      - name: Verify Doxygen headers
        run: |
          FAIL=0
          for f in include/types/*.h \
                   src/m7_rtos/bsw/*.h src/m7_rtos/bsw/*.c \
                   src/m7_rtos/bsw/e2e/*.h src/m7_rtos/bsw/e2e/*.c \
                   src/m7_rtos/bsw/wdgm/*.h src/m7_rtos/bsw/wdgm/*.c \
                   src/m7_rtos/bsw/dem/*.h src/m7_rtos/bsw/dem/*.c \
                   src/m7_rtos/bsw/csm/*.h src/m7_rtos/bsw/csm/*.c \
                   src/m7_rtos/cdd/ipc_ringbuffer/*.h \
                   src/m7_rtos/os/*.c \
                   src/m7_rtos/swc/swc_safe_state_mgr/*.h \
                   src/m7_rtos/swc/swc_vehicle_dynamics/*.h; do
            [ ! -f "$f" ] && continue
            for tag in "@file" "@brief" "@author" "@copyright" "@standards"; do
              if ! grep -q "$tag" "$f"; then
                echo "Missing $tag in $f"
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" -eq 0 ]; then echo "All Doxygen headers complete."; fi
          if [ "$FAIL" -ne 0 ]; then exit 1; fi

  # ============================================================================
  # Job 6: Supply-Chain Compliance (OpenChain ISO/IEC 5230 & 18974, NIST CSF)
  # ============================================================================
  supply-chain-compliance:
    name: Supply-Chain Compliance (ISO 5230 / ISO 18974 / NIST CSF)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Verify compliance artifacts exist (ISO 5230 §3.4, ISO 18974 §3.4)
        run: |
          FAIL=0
          for f in LICENSE NOTICE SECURITY.md docs/COMPLIANCE.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING compliance artifact: $f"
              FAIL=1
            else
              echo "OK: $f"
            fi
          done
          if [ "$FAIL" -ne 0 ]; then exit 1; fi

      - name: Validate SPDX SBOM (schema basics + full file coverage)
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          sbom_dir = "sbom"
          sboms = [f for f in os.listdir(sbom_dir) if f.endswith(".spdx.json")]
          if not sboms:
              print("ERROR: no SPDX SBOM found under sbom/")
              sys.exit(1)
          path = os.path.join(sbom_dir, sorted(sboms)[-1])
          with open(path) as f:
              doc = json.load(f)

          assert doc.get("spdxVersion") == "SPDX-2.3", "spdxVersion must be SPDX-2.3"
          assert doc.get("SPDXID") == "SPDXRef-DOCUMENT", "missing SPDXRef-DOCUMENT"
          pkgs = doc.get("packages", [])
          assert pkgs and pkgs[0]["name"] == "safety-supervisor", "package missing"
          catalogued = {e["fileName"][2:] if e["fileName"].startswith("./") else e["fileName"] for e in doc.get("files", [])}
          assert catalogued, "SBOM contains no file entries"

          # Every repository file must be catalogued (ISO 5230 §3.3 BOM process)
          skip = {"build", ".git", "sbom"}
          missing = []
          for dirpath, dirnames, filenames in os.walk("."):
              dirnames[:] = [d for d in dirnames if d not in skip]
              for fn in filenames:
                  rel = os.path.relpath(os.path.join(dirpath, fn), ".").replace(os.sep, "/")
                  if rel not in catalogued:
                      missing.append(rel)
          if missing:
              print("ERROR: files not catalogued in SBOM "
                    "(run: python3 tools/generate_sbom.py and commit):")
              for m in missing:
                  print("  -", m)
              sys.exit(1)
          print(f"SBOM OK: {path} catalogues {len(catalogued)} files, "
                f"repository fully covered.")
          PYEOF

      - name: Verify per-file copyright headers (ISO 5230 §3.1.5)
        run: |
          FAIL=0
          while IFS= read -r f; do
            if ! grep -q "norxs Technology LLC" "$f"; then
              echo "Missing norxs copyright in: $f"
              FAIL=1
            fi
          done < <(find include/ src/ tests/ -name "*.c" -o -name "*.h")
          if [ "$FAIL" -eq 0 ]; then
            echo "All source files carry norxs copyright."
          else
            exit 1
          fi

      - name: Verify SECURITY.md content (ISO 18974 §3.2.1 contact + SLAs)
        run: |
          for needle in "contact@norxs.com" "Coordinated Disclosure" "CVSS"; do
            if ! grep -q "$needle" SECURITY.md; then
              echo "SECURITY.md missing required element: $needle"
              exit 1
            fi
          done
          echo "SECURITY.md contains contact channel and disclosure SLAs."

      - name: Upload compliance evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: |
            sbom/
            SECURITY.md
            NOTICE
            LICENSE
            docs/COMPLIANCE.md
          retention-days: 90
